<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a212d", // Midnight Blue
                        "accent": "#c5a059", // PAGCOR Gold
                        "background-light": "#f6f7f7",
                        "background-dark": "#16181c",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>AceDesk | PAGCOR Login</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="flex-1 flex items-center justify-center p-6">
<!-- Main Login Card -->
<div class="w-full max-w-[440px] bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Card Header -->
<div class="pt-10 pb-6 px-10 flex flex-col items-center text-center">
<div class="size-16 bg-primary rounded-xl flex items-center justify-center mb-4 shadow-lg border-b-4 border-accent">
<span class="material-symbols-outlined text-accent text-4xl" data-icon="diamond">diamond</span>
</div>
<h1 class="text-3xl font-black tracking-tight text-primary dark:text-white">AceDesk</h1>
<p class="text-slate-500 dark:text-slate-400 font-medium mt-1">PAGCOR Ticketing System</p>
</div>
<!-- Login Form -->
    <form action="#" class="px-10 pb-10 space-y-5" method="POST">
<!-- Username Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Username</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-accent transition-colors" data-icon="person">person</span>
</div>
<input class="w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-accent/20 focus:border-accent outline-none transition-all placeholder:text-slate-400" placeholder="Enter your username" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-accent transition-colors" data-icon="lock">lock</span>
</div>
<input class="w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-accent/20 focus:border-accent outline-none transition-all placeholder:text-slate-400" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between py-1">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="rounded border-slate-300 text-primary focus:ring-accent h-4 w-4" type="checkbox"/>
<span class="text-sm text-slate-600 dark:text-slate-400 group-hover:text-primary transition-colors">Remember me</span>
</label>
<a class="text-sm font-semibold text-accent hover:text-accent/80 transition-colors" href="#">Forgot password?</a>
</div>
<!-- Login Button -->
<button class="w-full py-4 bg-primary text-white font-bold rounded-lg shadow-lg hover:bg-slate-800 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-accent" data-icon="login">login</span>
</button>
</form>
<!-- Card Footer -->
<div class="bg-slate-50 dark:bg-slate-800/50 px-10 py-6 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-widest font-bold">
                    Official PAGCOR Internal Portal
                </p>
</div>
</div>
</div>
<!-- Footer Information -->
<footer class="p-8 text-center">
<div class="flex flex-col items-center gap-4">
<div class="flex gap-6 text-slate-400 text-sm font-medium">
<a class="hover:text-accent transition-colors" href="#">Terms of Service</a>
<a class="hover:text-accent transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-accent transition-colors" href="#">Support Desk</a>
</div>
<p class="text-slate-400 text-xs">
                © 2024 Philippine Amusement and Gaming Corporation. All rights reserved.
            </p>
</div>
</footer>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-accent to-primary z-50"></div>
<div class="fixed -bottom-24 -left-24 w-96 h-96 bg-accent/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -top-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
